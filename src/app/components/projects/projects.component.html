<section class="showcase" id="projects">
  <div class="showcase-grid">
    <div class="showcase-headline">
      <div class="showcase-heading">
        <span class="showcase-label">{{ t('subtitle') }}</span>
        <div class="showcase-title-row">
          <h2 class="showcase-title">{{ t('title') }}</h2>
          <div class="showcase-drawline" appScrollReveal [revealDelay]="300"></div>
        </div>
      </div>
      <p class="showcase-intro">{{ t('intro') }}</p>
    </div>

    @for (project of projects; track project.id) {
      <div class="showcase-card" [id]="project.id">
        <div class="showcase-card-image-wrap">
          @if (project.showSticker) {
            <div class="showcase-sticker">
              <app-sticker-circle
                variant="feature"
                stickerColor="blue">
              </app-sticker-circle>
            </div>
          }
          <img class="showcase-card-img" [src]="project.imgUrl" [alt]="project.title" [appImageBounce]="project.animationImg" />
          <div class="showcase-card-overlay">
            <a class="showcase-card-btn" [routerLink]="['/projects', project.id]">{{ t('details') }}</a>
          </div>
        </div>

        <div class="showcase-card-text">
          <h3 class="showcase-card-title">{{ project.title }}</h3>
          <p class="showcase-card-desc">{{ project.description[locale.current] }}</p>
        </div>

        <div class="showcase-card-touch">
          <a class="showcase-card-btn showcase-card-btn--dark" [routerLink]="['/projects', project.id]">{{ t('details') }}</a>
        </div>
      </div>
    }
  </div>
</section>
