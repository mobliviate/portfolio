<section class="hero" id="home">
  <div class="hero-inner">
    <aside class="hero-socials" aria-label="Social links">
      <a
        class="hero-social-link"
        href="https://www.linkedin.com/in/odermattli/"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="LinkedIn"
      >
        <img src="/assets/03_Stickers/Linkedin.png" alt="" width="32" height="32" aria-hidden="true" />
      </a>
      <a
        class="hero-social-link"
        href="https://github.com/mobliviate"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="GitHub"
      >
        <img src="/assets/03_Stickers/Github.png" alt="" width="32" height="32" aria-hidden="true" />
      </a>
      <a class="hero-social-link" href="mailto:info@marcodermatt.ch" aria-label="E-Mail">
        <img src="/assets/03_Stickers/mail.png" alt="" width="32" height="32" aria-hidden="true" />
      </a>
    </aside>

    <div class="hero-layout">
    <div class="hero-content">
      <span class="hero-badge">
        <span class="hero-badge-default">{{ t('badge') }}</span>
        <span class="hero-badge-hover">{{ t('badgeHover') }}</span>
        <img
          class="hero-badge-hand"
          src="/assets/03_Stickers/waving_hand.png"
          alt=""
          aria-hidden="true"
        />
      </span>
      <h1 class="hero-headline">
        <span class="hero-headline-primary">
          <span class="hero-letter hero-letter--upper">F</span><span class="hero-letter hero-letter--lower">r</span><span class="hero-letter hero-letter--lower">o</span><span class="hero-letter hero-letter--lower">n</span><span class="hero-letter hero-letter--lower">t</span><span class="hero-letter hero-letter--lower">e</span><span class="hero-letter hero-letter--lower">n</span><span class="hero-letter hero-letter--lower">d</span>
        </span>
        <span class="hero-headline-secondary">
          @for (letter of secondaryLetters; track $index) {
            <span class="hero-letter hero-letter--upper">{{ letter }}</span>
          }
        </span>
      </h1>
      <a class="hero-cta" (click)="scrollToContact()" role="button">{{ t('cta') }}</a>
    </div>

    <figure class="hero-polaroid" aria-labelledby="hero-polaroid-caption">
      <span class="hero-photo" aria-hidden="true"></span>
      <img
        class="hero-frame"
        src="/assets/03_Stickers/Polaroid Frame.png"
        alt=""
        width="204"
        height="244"
        loading="lazy"
      />
      <figcaption class="hero-caption" id="hero-polaroid-caption">
        <span class="hero-caption-default">Marc :)</span>
        <span class="hero-caption-hover">Marc :D</span>
      </figcaption>
    </figure>
  </div>
  </div>
</section>
