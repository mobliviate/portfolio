<header class="hero-header" aria-label="Primary">
  <div class="hero-header__inner">
    <a class="hero-header__logo" routerLink="/" aria-label="Marc Odermatt home">
      <span class="hero-header__logo-text" aria-hidden="true">MO</span>
    </a>

    <nav class="hero-header__nav" aria-label="Main navigation">
      <a class="hero-header__link" href="#about">About me</a>
      <a class="hero-header__link" href="#skills">Skills</a>
      <a class="hero-header__link" href="#projects">Projects</a>
      <a class="hero-header__link" href="#contact">Contact</a>
    </nav>

    <div class="hero-header__language" aria-label="Toggle language" (click)="toggleLang()">
      <button
        class="hero-header__language-btn"
        [class.hero-header__language-btn--active]="lang === 'en'"
        type="button"
      >EN</button>
      <span class="hero-header__toggle" [class.hero-header__toggle--right]="lang === 'de'" aria-hidden="true">
        <span class="hero-header__toggle-thumb"></span>
      </span>
      <button
        class="hero-header__language-btn"
        [class.hero-header__language-btn--active]="lang === 'de'"
        type="button"
      >DE</button>
    </div>

    <button class="hero-header__menu" type="button" aria-label="Menu">
      <span class="hero-header__menu-line"></span>
      <span class="hero-header__menu-line"></span>
      <span class="hero-header__menu-line"></span>
    </button>
  </div>
</header>
