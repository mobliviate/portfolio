<section class="skills" id="skills">
  <div class="skills-content">
    <div class="skills-title-text">
      <div class="skills-header">
        <span class="skills-subtitle">{{ t('subtitle') }}</span>
        <div class="skills-title-wrap">
          <img
            class="skills-circle-line"
            src="/assets/00_Hand-drawn lines/02_Skills/Color option 1.png"
            alt=""
            aria-hidden="true"
          />
          <h2 class="skills-title">{{ t('title') }}</h2>
        </div>
      </div>

      <div class="skills-description">
        <img
          class="skills-description-bg"
          src="/assets/02_Ripped Paper/1.Skills description.png"
          alt=""
          aria-hidden="true"
        />
        <p class="skills-description-text">{{ t('description') }}</p>
      </div>
    </div>

    <div class="skills-logos">
      @for (skill of skills; track skill.name) {
        <div class="skills-logo-item">
          <div class="skills-logo-icon">
            <img [src]="skill.icon" [alt]="skill.name" />
          </div>
          <span class="skills-logo-label">{{ skill.name }}</span>
        </div>
      }
    </div>
  </div>

  <div
    class="skills-sticker"
    [class.skills-sticker--transition]="stickerState === 'transition'"
    [class.skills-sticker--final]="stickerState === 'final'"
    (click)="peelSticker()"
  >
    <img
      class="skills-sticker-layer skills-sticker-layer--final"
      src="/assets/03_Stickers/01_Skills - Peel off/Final.png"
      alt=""
    />
    <div class="skills-sticker-content">
      <span class="skills-sticker-heading">{{ t('stickerHeading') }}</span>
      <div class="skills-sticker-icons">
        <div class="skills-sticker-icon-item">
          <svg
            viewBox="-11.5 -10.232 23 20.463"
            width="40"
            height="40"
          >
            <circle r="2.05" fill="#F8F9FA" />
            <g stroke="#F8F9FA" fill="none" stroke-width="1">
              <ellipse rx="11" ry="4.2" />
              <ellipse rx="11" ry="4.2" transform="rotate(60)" />
              <ellipse rx="11" ry="4.2" transform="rotate(120)" />
            </g>
          </svg>
          <span>React</span>
        </div>
        <div class="skills-sticker-icon-item">
          <img
            src="/assets/05_Skills/vue_small.png"
            alt="Vue.js"
            width="40"
            height="40"
          />
          <span>Vue.js</span>
        </div>
      </div>
    </div>

    <img
      class="skills-sticker-layer skills-sticker-layer--transition"
      src="/assets/03_Stickers/01_Skills - Peel off/Transition.png"
      alt=""
    />

    <img
      class="skills-sticker-layer skills-sticker-layer--default"
      src="/assets/03_Stickers/01_Skills - Peel off/Default.png"
      alt=""
    />
    <div class="skills-sticker-overlay">
      <img
        class="skills-sticker-arrow"
        src="/assets/03_Stickers/Arrow.png"
        alt=""
        aria-hidden="true"
      />
      <span class="skills-sticker-text" [innerHTML]="t('stickerPull')"></span>
    </div>
  </div>
</section>
