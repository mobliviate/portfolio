server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|json|woff2?|ttf|eot|svg|png|jpe?g|webp|gif|ico|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
